<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="hexGrad" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3d6b1e"/>
      <stop offset="100%" stop-color="#1a3509"/>
    </linearGradient>
  </defs>
  <!-- Sun rays -->
  <g stroke="#E8861A" stroke-width="1.4" stroke-linecap="round" opacity="0.7">
    <line x1="20" y1="1" x2="20" y2="5.5"/>
    <line x1="20" y1="34.5" x2="20" y2="39"/>
    <line x1="1" y1="20" x2="5.5" y2="20"/>
    <line x1="34.5" y1="20" x2="39" y2="20"/>
    <line x1="4.5" y1="4.5" x2="7.5" y2="7.5"/>
    <line x1="32.5" y1="32.5" x2="35.5" y2="35.5"/>
    <line x1="35.5" y1="4.5" x2="32.5" y2="7.5"/>
    <line x1="7.5" y1="32.5" x2="4.5" y2="35.5"/>
  </g>
  <!-- Hexagon (solar panel motif) -->
  <path d="M20 4.5 L33 12 L33 28 L20 35.5 L7 28 L7 12 Z" fill="url(#hexGrad)"/>
  <!-- White leaf / sprout -->
  <path d="M20 32 C20 32 13 26 13 19 C13 14 16.2 10.5 20 10 C23.8 10.5 27 14 27 19 C27 26 20 32 20 32 Z" fill="white" opacity="0.93"/>
  <!-- Midrib -->
  <line x1="20" y1="32" x2="20" y2="14.5" stroke="#2D5016" stroke-width="0.9" opacity="0.3"/>
  <!-- Solar grid lines on leaf (subtle horizontal bars) -->
  <line x1="15.5" y1="17" x2="24.5" y2="17"   stroke="#2D5016" stroke-width="0.55" opacity="0.18"/>
  <line x1="14.5" y1="21" x2="25.5" y2="21"   stroke="#2D5016" stroke-width="0.55" opacity="0.18"/>
  <line x1="15.5" y1="25.5" x2="24.5" y2="25.5" stroke="#2D5016" stroke-width="0.55" opacity="0.18"/>
</svg>
